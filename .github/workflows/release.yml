name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

permissions:
  contents: write

jobs:
  build-sandbox-agent:
    name: Build Sandbox Agent
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        shell: pwsh
        run: |
          Write-Host "Current directory:"
          Get-Location

          Write-Host "Repository root contents:"
          Get-ChildItem -Force | Select-Object Mode, Name

          if (-not (Test-Path "sandbox-agent\Cargo.toml")) {
            Write-Error "sandbox-agent\Cargo.toml was not found. The tag being built likely does not contain the latest project files."
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build agent
        shell: pwsh
        run: |
          cargo build --manifest-path sandbox-agent\Cargo.toml --release

      - name: Package agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidatePaths = @(
            "target\release\sandbox-agent.exe",
            "sandbox-agent\target\release\sandbox-agent.exe"
          )

          $agentExe = $null

          foreach ($path in $candidatePaths) {
            Write-Host "Checking $path"
            if (Test-Path $path) {
              $agentExe = $path
              break
            }
          }

          if (-not $agentExe) {
            Write-Host "Could not find sandbox-agent.exe in expected paths."
            Write-Host "Searching for executables:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

            Write-Error "No suitable sandbox-agent.exe was found."
            exit 1
          }

          Write-Host "Using agent executable: $agentExe"
          Copy-Item $agentExe "dist\sandbox-agent.exe" -Force

      - name: Upload agent to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sandbox-agent.exe

  build-tauri-app:
    name: Build Tauri App
    runs-on: windows-latest
    needs: build-sandbox-agent

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        shell: pwsh
        run: |
          Write-Host "Current directory:"
          Get-Location

          Write-Host "Repository root contents:"
          Get-ChildItem -Force | Select-Object Mode, Name

          if (-not (Test-Path "ui\package.json")) {
            Write-Error "ui\package.json was not found."
            exit 1
          }

          if (-not (Test-Path "src-tauri\Cargo.toml")) {
            Write-Error "src-tauri\Cargo.toml was not found."
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Build Tauri host app
        shell: pwsh
        run: |
          cargo build --manifest-path src-tauri\Cargo.toml --release

      - name: Package Tauri app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidatePaths = @(
            "target\release\sandbox-analyzer.exe",
            "target\release\soteria.exe",
            "src-tauri\target\release\sandbox-analyzer.exe",
            "src-tauri\target\release\soteria.exe"
          )

          $hostExe = $null

          foreach ($path in $candidatePaths) {
            Write-Host "Checking $path"
            if (Test-Path $path) {
              $hostExe = $path
              break
            }
          }

          if (-not $hostExe) {
            Write-Host "Could not find host app exe in expected paths."
            Write-Host "Searching for executables:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

            $hostExe = Get-ChildItem -Recurse -Filter "*.exe" |
              Where-Object {
                $_.FullName -like "*target*release*" -and
                $_.Name -notlike "build-script-*"
              } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $hostExe) {
            Write-Error "No suitable Tauri host executable was found."
            exit 1
          }

          Write-Host "Using Tauri host executable: $hostExe"
          Copy-Item $hostExe "dist\Sandbox-Analyzer-${{ github.ref_name }}.exe" -Force

      - name: Upload Tauri app to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sandbox-Analyzer-${{ github.ref_name }}.exe
