name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sandbox-agent:
    name: Build Sandbox Agent
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        shell: pwsh
        run: |
          Write-Host "Current directory:"
          Get-Location

          Write-Host "Repository root contents:"
          Get-ChildItem -Force | Select-Object Mode, Name

          if (-not (Test-Path "sandbox-agent\Cargo.toml")) {
            Write-Error "sandbox-agent\Cargo.toml was not found."
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build agent
        shell: pwsh
        run: |
          cargo build --manifest-path sandbox-agent\Cargo.toml --release

      - name: Package agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidatePaths = @(
            "target\release\sandbox-agent.exe",
            "sandbox-agent\target\release\sandbox-agent.exe"
          )

          $agentExe = $null

          foreach ($path in $candidatePaths) {
            Write-Host "Checking $path"

            if (Test-Path $path) {
              $agentExe = $path
              break
            }
          }

          if (-not $agentExe) {
            Write-Host "Could not find sandbox-agent.exe in expected paths."
            Write-Host "Searching for executables:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

            Write-Error "No suitable sandbox-agent.exe was found."
            exit 1
          }

          Write-Host "Using agent executable: $agentExe"
          Copy-Item $agentExe "dist\sandbox-agent.exe" -Force

      - name: Upload agent to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sandbox-agent.exe

  build-tauri-app:
    name: Build Tauri App
    runs-on: windows-latest
    needs: build-sandbox-agent

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        shell: pwsh
        run: |
          Write-Host "Current directory:"
          Get-Location

          Write-Host "Repository root contents:"
          Get-ChildItem -Force | Select-Object Mode, Name

          if (-not (Test-Path "ui\package.json")) {
            Write-Error "ui\package.json was not found."
            exit 1
          }

          if (-not (Test-Path "src-tauri\Cargo.toml")) {
            Write-Error "src-tauri\Cargo.toml was not found."
            exit 1
          }

          if (-not (Test-Path "src-tauri\tauri.conf.json")) {
            Write-Error "src-tauri\tauri.conf.json was not found."
            exit 1
          }

          if (-not (Test-Path "src-tauri\icons\icon.ico")) {
            Write-Error "src-tauri\icons\icon.ico was not found. Add your Soteria icon at src-tauri/icons/icon.ico."
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri app
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo tauri build --verbose

      - name: Package Tauri app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Write-Host "Searching for generated executables:"
          Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

          $candidatePaths = @(
            "target\release\sandbox-analyzer-host.exe",
            "target\release\sandbox-analyzer.exe",
            "target\release\soteria.exe",
            "target\release\Soteria.exe",
            "src-tauri\target\release\sandbox-analyzer-host.exe",
            "src-tauri\target\release\sandbox-analyzer.exe",
            "src-tauri\target\release\soteria.exe",
            "src-tauri\target\release\Soteria.exe"
          )

          $hostExe = $null

          foreach ($path in $candidatePaths) {
            Write-Host "Checking $path"

            if (Test-Path $path) {
              $hostExe = $path
              break
            }
          }

          if (-not $hostExe) {
            Write-Host "Could not find host app exe in expected paths."
            Write-Host "Searching release folders:"

            $hostExe = Get-ChildItem -Recurse -Filter "*.exe" |
              Where-Object {
                $_.FullName -like "*target*release*" -and
                $_.FullName -notlike "*build-script*" -and
                $_.FullName -notlike "*deps*" -and
                $_.Name -ne "sandbox-agent.exe"
              } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $hostExe) {
            Write-Error "No suitable Soteria host executable was found."
            exit 1
          }

          Write-Host "Using Soteria host executable: $hostExe"
          Copy-Item $hostExe "dist\Soteria-${{ github.ref_name }}.exe" -Force

          Write-Host "Searching for MSI installers:"
          Get-ChildItem -Recurse -Filter "*.msi" | Select-Object FullName

          $msiFiles = Get-ChildItem -Recurse -Filter "*.msi" |
            Where-Object {
              $_.FullName -like "*target*release*bundle*"
            }

          foreach ($msi in $msiFiles) {
            Copy-Item $msi.FullName "dist\$($msi.Name)" -Force
          }

      - name: Upload Tauri app to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Soteria-${{ github.ref_name }}.exe
            dist/*.msi
