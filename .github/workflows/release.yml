name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

permissions:
  contents: write

jobs:
  build-sandbox-agent:
    name: Build Sandbox Agent
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build agent
        working-directory: sandbox-agent
        run: cargo build --release

      - name: Package agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidatePaths = @(
            "target\release\sandbox-agent.exe",
            "sandbox-agent\target\release\sandbox-agent.exe"
          )

          $agentExe = $null

          foreach ($path in $candidatePaths) {
            if (Test-Path $path) {
              $agentExe = $path
              break
            }
          }

          if (-not $agentExe) {
            Write-Host "Could not find sandbox-agent.exe in the expected paths."
            Write-Host "Searching for built executables..."

            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

            $agentExe = Get-ChildItem -Recurse -Filter "*.exe" |
              Where-Object {
                $_.FullName -like "*target*release*" -and
                $_.Name -notlike "build-script-*"
              } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $agentExe) {
            Write-Error "No suitable built agent executable was found."
            exit 1
          }

          Write-Host "Using agent executable: $agentExe"
          Copy-Item $agentExe "dist\sandbox-agent.exe" -Force

      - name: Upload agent to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sandbox-agent.exe

  build-tauri-app:
    name: Build Tauri App
    runs-on: windows-latest
    needs: build-sandbox-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "Sandbox Analyzer ${{ github.ref_name }}"
          releaseBody: "Automated build for ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
